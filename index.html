<!DOCTYPE html>
<html lang="en">

  <head>
    <title>RandomQuoteMachine</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">

  </head>
    
  <body>
  <div id="body">
  <div id="quote-box">
    <p id="text"><i class="fa fa-quote-left" id="icon"></i><span id="quote"> </span></p>
    <p id="author"></p><span><a id="tweet-quote" href="https://twitter.com/intent/tweet" target="_blank"><i class="fab fa-twitter-square" id="icon"></i></a><a id="tumblr-quote" href="https://www.tumblr.com"><i class="fab fa-tumblr-square" id="icon"></i></a>
      <input id="new-quote" type="button" value="New quote"/></span>
  </div>
  <p id="myName"><em>By Hassna Bahadou</em></p>
</div>
  <script src='https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js'></script>
  <script  src="script.js"></script>

  </body>
  
</html>
